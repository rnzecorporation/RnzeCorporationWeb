kind = "web"
previewPath = "/"
title = "RnzeCorporation App Hub"
version = "1.0.0"
id = "artifacts/rnze-hub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20362

[services.development]
run = "pnpm --filter @workspace/rnze-hub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rnze-hub", "run", "build" ]
publicDir = "artifacts/rnze-hub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20362"
BASE_PATH = "/"
